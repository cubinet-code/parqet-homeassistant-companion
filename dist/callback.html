<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parqet — Authorizing…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 320px;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    h2 { margin: 0 0 8px; font-size: 1.1rem; }
    p  { margin: 0; font-size: 0.875rem; color: #666; }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e0e0e0;
      border-top-color: #009991;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f44336; margin-top: 12px; font-size: 0.82rem; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon"
         src="https://developer.parqet.com/img/parqet-icon-trans.svg"
         alt="Parqet" />
    <h2 id="heading">Authorizing…</h2>
    <p id="msg">Completing your Parqet authorization.<br>This window will close automatically.</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <script>
    (function () {
      // Cloudflare Worker proxy — adds CORS headers (Parqet token endpoint has no CORS support)
      var TOKEN_URL = 'https://parqet-token-proxy.oliver-f26.workers.dev';

      var params  = new URLSearchParams(window.location.search);
      var code    = params.get('code');
      var stateParam = params.get('state');
      var oauthError = params.get('error');

      function finish(msg) {
        if (window.opener) {
          window.opener.postMessage(msg, '*');
          setTimeout(function () { window.close(); }, 300);
        } else {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('msg').textContent =
            msg.error ? ('Error: ' + msg.error) : 'Authorization complete. You may close this window.';
          if (msg.error) document.getElementById('msg').className = 'error';
        }
      }

      // Decode state payload { s: csrf, v: verifier, c: clientId, r: redirectUri }
      var csrfState, codeVerifier, clientId, redirectUri;
      try {
        var padded = stateParam.replace(/-/g, '+').replace(/_/g, '/');
        var payload = JSON.parse(atob(padded));
        csrfState    = payload.s;
        codeVerifier = payload.v;
        clientId     = payload.c;
        redirectUri  = payload.r;
      } catch (e) {
        finish({ type: 'parqet-oauth', state: stateParam, error: 'Invalid state parameter.' });
        return;
      }

      if (oauthError) {
        finish({ type: 'parqet-oauth', state: csrfState, error: oauthError });
        return;
      }

      if (!code || !codeVerifier || !clientId || !redirectUri) {
        finish({ type: 'parqet-oauth', state: csrfState, error: 'Missing required OAuth parameters.' });
        return;
      }

      // Exchange authorization code for tokens from this origin (cubinet-code.github.io)
      // This avoids the CORS restriction when calling from the HA browser origin.
      fetch(TOKEN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code:          code,
          code_verifier: codeVerifier,
          client_id:     clientId,
          redirect_uri:  redirectUri,
        }).toString(),
      })
      .then(function (resp) {
        if (!resp.ok) {
          return resp.text().then(function (body) {
            throw new Error('Token exchange failed (' + resp.status + '): ' + body);
          });
        }
        return resp.json();
      })
      .then(function (token) {
        finish({ type: 'parqet-oauth', state: csrfState, token: token });
      })
      .catch(function (err) {
        finish({ type: 'parqet-oauth', state: csrfState, error: err.message });
      });
    })();
  </script>
</body>
</html>
