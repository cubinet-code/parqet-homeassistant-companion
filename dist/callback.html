<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parqet — Authorizing…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 320px;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    h2 { margin: 0 0 8px; font-size: 1.1rem; }
    p  { margin: 0; font-size: 0.875rem; color: #666; }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e0e0e0;
      border-top-color: #009991;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f44336; margin-top: 12px; font-size: 0.82rem; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon"
         src="https://developer.parqet.com/img/parqet-icon-trans.svg"
         alt="Parqet" />
    <h2>Authorizing…</h2>
    <p id="msg">Completing your Parqet authorization.<br>This window will close automatically.</p>
    <div class="spinner" id="spinner"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      if (window.opener) {
        window.opener.postMessage(
          { type: 'parqet-oauth', code: code, state: state, error: error },
          '*'
        );
        // Give the opener a moment to receive the message before closing
        setTimeout(function () { window.close(); }, 300);
      } else {
        // No opener — likely navigated directly
        document.getElementById('spinner').style.display = 'none';
        if (error) {
          document.getElementById('msg').textContent = 'Authorization was denied: ' + error;
          document.getElementById('msg').className = 'error';
        } else {
          document.getElementById('msg').textContent =
            'Authorization complete. You may close this window.';
        }
      }
    })();
  </script>
</body>
</html>
